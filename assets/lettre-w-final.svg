<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Arrière-plan gris très clair -->
  <rect width="400" height="400" fill="#F7F9FA"/>
  
  <!-- Lettre W stylisée - version géométrique précise et minimaliste -->
  <!-- La lettre occupe environ 60-70% de l'espace, centrée avec espace négatif généreux -->
  <!-- Style flat design : pas d'ombres, pas de dégradés, couleur unie -->
  
  <!-- Version optimisée avec des lignes nettes et précises -->
  <!-- Les points sont calculés pour créer une lettre W équilibrée et élégante -->
  <path d="M 100 120 
           L 140 280 
           L 180 200 
           L 220 280 
           L 260 200 
           L 300 280 
           L 340 120 
           Z" 
        fill="#0F7C7C"
        stroke="none"/>
</svg>

